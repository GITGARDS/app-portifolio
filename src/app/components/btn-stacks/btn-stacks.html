<mat-card appearance="filled" class="h-52 flex gap-3 px-2 !border-none" appearance="outlined">
  <mat-card-header>
    <mat-card-title>Stacks</mat-card-title>
  </mat-card-header>

  <div class="flex flex-wrap gap-2">
    @for (item of stacks(); track $index) {
      <span class="px-2 py-1 text-[14px] font-medium text-gray-500 bg-indigo-100 rounded-full ">
        {{ item }}
      </span>
    }
  </div>
</mat-card>
