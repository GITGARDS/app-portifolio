<mat-card class="w-60 h-60 flex items-center p-8 gap-2  hover:!shadow-2xl hover:!shadow-indigo-200  transition-all !border-gray-200 hover:!border-indigo-300" appearance="outlined">
  <div
    class="bg-indigo-50 dark:bg-indigo-900/30 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"
  >
    <img mat-card-image [src]="stack.icone" alt="Photo of a Shiba Inu" width="60" />
  </div>
  <mat-card-header>
    <mat-card-title class="text-center">{{ stack.title }}</mat-card-title>
  </mat-card-header>
  <span class="text-[12px] opacity-60">{{ stack.progress }}%</span>
  <mat-progress-bar mode="determinate" [value]="stack.progress" color="primary"></mat-progress-bar>
</mat-card>
