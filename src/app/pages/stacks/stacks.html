<div class="w-[80%] m-auto pb-30 border-b border-gray-200" id="stacks">
  <app-title-pagina titulo="habilidades" descricao="Minhas Habilidades." />

  <div class="w-full rounded-lg p-4 mt-8 bg-gray-100">
    <div class="flex flex-col">
      <div class="grid grid-cols-1 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4">
        @for (item of items; track $index) {
          <div class="w-full">
            <app-stack-card [stack]="item" />
          </div>
        }
      </div>
    </div>
  </div>
</div>
