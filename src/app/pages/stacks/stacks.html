<div class="w-full mt-8">
  <app-title-pagina titulo="Stacks" descricao="Ferramentas que utilizo regularmente." />

  <div class="w-full rounded-lg p-4 mt-8 bg-gray-100">
    <div class="flex flex-col">
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        @for (item of items; track $index) {
          <div class="w-full">
            <app-stack-card [stack]="item" />
          </div>
        }
      </div>
    </div>
  </div>
</div>
