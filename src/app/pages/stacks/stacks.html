<div class="w-[80%] m-auto pb-30 border-b border-gray-200" id="stacks">
  <app-title-pagina titulo="habilidades" descricao="Minhas Habilidades." />

  <div class="w-full p-4 mt-8">
    <div class="flex flex-col items-center justify-center">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- <div class="grid grid-cols-[1fr_1fr_1fr_1fr] gap-2"> -->
        @for (item of items; track $index) {
          <div class="w-full">
            <app-stack-card [stack]="item" />
          </div>
        }
      </div>
    </div>
  </div>
</div>
