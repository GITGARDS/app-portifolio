<div class="w-[80%] m-auto pt-20 pb-20 border-b border-gray-200" id="sobre">
  <app-title-pagina titulo="Sobre mim" descricao="Criando coisas incríveis" />
  <div class="flex justify-center items-center">
    <div class="flex flex-col items-center pt-8">
      <div
        class="aspect-square rounded-full overflow-hidden bg-zinc-100 dark:bg-zinc-800 border-8 border-white dark:border-zinc-900 shadow-2xl relative z-10"
      >
        <img
          [src]="about().avatar"
          [alt]="about().name"
          width="150"
          class="object-cover object-top"
          priority
        />
      </div>

      <div class="flex gap-4 pt-6">
        @for (social of about().socials; track social.name) {
          <a
            [href]="social.url"
            target="_blank"
            class="p-3 text-zinc-500 hover:text-indigo-600 dark:text-zinc-400 dark:hover:text-indigo-400 transition-colors bg-indigo-100 dark:bg-zinc-800 rounded-xl"
          >
            <mat-icon>{{ social.icon }}</mat-icon>
          </a>
        }
      </div>

      <div
        class="flex flex-col gap-10 prose max-w-none prose-lg pt-8 pb-8 dark:prose-invert xl:col-span-2"
      >
        <h1 class="text-5xl sm:text-7xl font-bold text-zinc-900 dark:text-white leading-tight mb-6">
          Olá, eu sou <span class="text-indigo-600">{{ about().name }}</span>
        </h1>
        <p class="text-xl text-zinc-600 dark:text-zinc-400 mb-8 max-w-xl leading-relaxed">
          {{ about().bio }}
        </p>
      </div>
    </div>
  </div>
</div>
