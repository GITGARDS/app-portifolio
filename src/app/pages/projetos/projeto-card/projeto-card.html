<mat-card
  class="flex gap-2 p-0 group hover:!shadow-2xl hover:!shadow-indigo-300 transition-all !border-gray-200 overflow-hidden hover:!border-indigo-400"
  appearance="outlined"
>
  <div class="h-48 aspect-video overflow-hidden">
    <img
      mat-card-image
      loading="lazy"
      decoding="async"
      fetchpriority="high"
      [src]="projeto().capa"
      alt="imagem"
      width="200"
      class="!rounded-b-none opacity-90 h-full w-full object-cover group-hover:scale-110 transition-transform duration-300"
      priority
    />
  </div>
  <mat-card-header>
    <mat-card-title class="text-2xl">{{ projeto().titulo }}</mat-card-title>
  </mat-card-header>

  <app-btn-stacks [stacks]="projeto().stacks" />

  <!-- <mat-card-content class="h-36 overflow-hidden">
    <p class="text-[12px] opacity-60">
      {{ projeto().descricao }}
    </p>
  </mat-card-content> -->

  <mat-card-actions class="!flex !flex-row !gap-1">
    <a
      matIconButton
      [href]="projeto().urlProj"
      target="_blank"
      class="!bg-blue-500 !text-white"
      matTooltip="Url do projeto"
      matTooltipPosition="above"
    >
      <mat-icon>open_in_new</mat-icon>
    </a>
    <a
      matIconButton
      [href]="projeto().urlRepo"
      target="_blank"
      class="!bg-blue-500 !text-white"
      matTooltip="Url do repositorio"
      matTooltipPosition="above"
    >
      <mat-icon>code</mat-icon>
    </a>
  </mat-card-actions>
</mat-card>
