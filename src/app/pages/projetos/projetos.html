<div class="w-[80%] m-auto mb-10" id="projetos">
  <app-title-pagina titulo="Projetos" descricao="Trabalhos selecionados" />

  <div class="w-full border border-gray-200 rounded-xl p-4 mt-8">
    <div class="flex flex-col gap-5 w-full">
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 w-full gap-4">
        @for (item of items; track $index) {
          <div class="w-full">
            <app-projeto-card [projeto]="item" />
          </div>
        }
      </div>
    </div>
  </div>
</div>
