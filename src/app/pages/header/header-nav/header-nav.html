<ul class="h-full flex items-center justify-center lg:justify-start gap-4">
  @for (item of items; track $index) {
    <li>
      <a
        matButton="filled"
        [routerLink]="item.link"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >{{ item.label }}</a
      >
    </li>
  }
</ul>
